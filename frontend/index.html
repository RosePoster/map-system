<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unmanned Fleet Risk Warning System</title>
    <!-- Blocking script to prevent FOUC (Flash Of Unstyled Content) during theme hydration -->
    <script>
      (function () {
        try {
          var storageKey = 'theme-storage';
          var localData = localStorage.getItem(storageKey);
          var isDark = true; // 默认深色优先
          
          if (localData) {
            var parsed = JSON.parse(localData);
            if (parsed.state !== undefined) {
              isDark = parsed.state.isDarkMode;
            }
          }
          
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.classList.remove('light');
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
          }
        } catch (e) {
          // Fallback
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

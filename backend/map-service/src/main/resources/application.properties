spring.application.name=map-service

# ===============================
# MQTT config
# ===============================
mqtt.broker=tcp://localhost:1883
mqtt.clientId=${spring.application.name:listener}-${random.uuid}
mqtt.topic=usv/AisMessage

# ===============================
# AIS config
# ===============================
ais.timezone=Asia/Shanghai
ais.own-ship-mmsi=123456789
ais.confidence=0.95

# ===============================
# LOG config
# ===============================
logging.level.com.whut.map=DEBUG
# ===============================
# LLM config (v1 scaffold)
# ===============================
llm.enabled=false
llm.model=TODO_MODEL
llm.timeout-ms=1500
llm.max-targets-per-call=3
llm.fallback-template-enabled=true

# ====================================================
# Database Configuration
# Primary DB: geospatial_intelligence_db (existing MQTT data)
# Secondary DB: mqtt_msg_db (S-57 ENC Chart data)
# ====================================================
# Use mqtt_msg_db for S-57 chart data access
spring.datasource.url=jdbc:postgresql://localhost:5432/mqtt_msg_db
spring.datasource.username=myuser
spring.datasource.password=mypassword

# Read-only connection for chart data
spring.datasource.hikari.read-only=true
spring.jpa.properties.hibernate.readOnly=true

# ====================================================
# JPA & Hibernate ??
# ====================================================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ?? Hibernate ?? PostGIS ??
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ====================================================
# S-57 ENC Chart Configuration
# ====================================================
# S-57 chart data tile endpoint
s57.tile.url=/api/s57/tiles/{z}/{x}/{y}.pbf
# Available zoom levels for S-57 chart data
s57.tile.min-zoom=0
s57.tile.max-zoom=14
# Default safety contour depth (meters)
s57.safety.contour.default=10.0
# S-57 data bounding box (Jamaica Bay Area)
s57.bounds.min-lon=-73.8
s57.bounds.min-lat=40.575
s57.bounds.max-lon=-73.725
s57.bounds.max-lat=40.65

# ====================================================
# CORS Configuration
# ====================================================
# Enable CORS for frontend access
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600
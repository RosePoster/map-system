spring.application.name=map-service

# ===============================
# MQTT config
# ===============================
mqtt.active=local
mqtt.broker=${mqtt.${mqtt.active}.broker}
mqtt.username=${mqtt.${mqtt.active}.username:}
mqtt.password=${mqtt.${mqtt.active}.password:}
mqtt.clientId=${spring.application.name:listener}-${random.uuid}
mqtt.topic=usv/AisMessage
mqtt.remote.broker=tcp://172.16.2.64:1883
mqtt.remote.username=
mqtt.remote.password=
mqtt.local.broker=tcp://localhost:1883
mqtt.local.username=
mqtt.local.password=
mqtt.weather.broker=${mqtt.broker}
mqtt.weather.client-id=${spring.application.name:map-service}-weather-${random.uuid}
mqtt.weather.topic=usv/Weather
mqtt.weather.username=${mqtt.username:}
mqtt.weather.password=${mqtt.password:}

# ===============================
# AIS config
# ===============================
ais.timezone=Asia/Shanghai
ais.own-ship-mmsi=123456789
ais.confidence=0.95

# ===============================
# Risk assessment thresholds
# ===============================
# DCPA unit: nautical miles (nm), TCPA unit: seconds (s)
risk.assessment.alarm-dcpa-nm=0.3
risk.assessment.warning-dcpa-nm=0.5
risk.assessment.caution-dcpa-nm=1.0
risk.assessment.alarm-tcpa-sec=300.0
risk.assessment.warning-tcpa-sec=900.0
risk.assessment.caution-tcpa-sec=1800.0

# ===============================
# Ship state cleanup config
# ===============================
ship.state.expire-after-seconds=30
ship.state.cleanup-interval-seconds=30

# ===============================
# Ship domain config
# ===============================
engine.ship-domain.base-fore-nm=0.2
engine.ship-domain.base-aft-nm=0.04
engine.ship-domain.base-port-nm=0.08
engine.ship-domain.base-stbd-nm=0.08
engine.ship-domain.reference-speed-kn=8.0
engine.ship-domain.min-speed-factor=0.5
engine.ship-domain.max-speed-factor=2.0
engine.risk-meta.weather-alert.low-visibility-nm=2.0
engine.risk-meta.weather-alert.high-wind-kn=25.0
engine.risk-meta.weather-alert.heavy-precipitation-mm-per-hr=10.0
engine.risk-meta.weather-alert.strong-current-set-kn=2.5
engine.risk-meta.weather-alert.stale-threshold-seconds=60

# ===============================
# LOG config
# ===============================
logging.level.com.whut.map=DEBUG

# ===============================
# LLM common config
# ===============================
llm.enabled=true
# gemini or zhipu
llm.provider=zhipu
llm.timeout-ms=15000
llm.max-targets-per-call=1
llm.chat-context-max-targets=5
llm.cooldown-seconds=20
llm.fallback-template-enabled=true
llm.conversation-max-turns=10
llm.conversation-ttl-minutes=30
llm.conversation-evict-interval-ms=60000
llm.conversation-token-budget=6000

# ===============================
# Gemini config
# ===============================
llm.gemini.api-key=${GEMINI_API_KEY:}
llm.gemini.model=gemini-2.5-flash
llm.gemini.proxy.enabled=false
llm.gemini.proxy.host=127.0.0.1
llm.gemini.proxy.port=7897
llm.gemini.proxy.scheme=http
llm.gemini.retry.max-retries=2
llm.gemini.retry.initial-backoff-ms=1000

# ===============================
# Zhipu config
# ===============================
llm.zhipu.api-key=${ZHIPU_API_KEY:}
llm.zhipu.model=glm-4-flash

# ===============================
# Whisper config
# ===============================
whisper.url=http://127.0.0.1:8081
whisper.timeout-ms=60000
whisper.max-audio-size-bytes=10485760
whisper.default-language=zh

# ====================================================
# Database Configuration
# Primary DB: geospatial_intelligence_db (existing MQTT data)
# Secondary DB: mqtt_msg_db (S-57 ENC Chart data)
# ====================================================
# Use mqtt_msg_db for S-57 chart data access
spring.datasource.url=jdbc:postgresql://localhost:5432/mqtt_msg_db
spring.datasource.username=myuser
spring.datasource.password=mypassword

# Read-only connection for chart data
spring.datasource.hikari.read-only=true
spring.jpa.properties.hibernate.readOnly=true

# ====================================================
# JPA & Hibernate ??
# ====================================================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ?? Hibernate ?? PostGIS ??
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ====================================================
# S-57 ENC Chart Configuration
# ====================================================
# S-57 chart data tile endpoint
s57.tile.url=/api/s57/tiles/{z}/{x}/{y}.pbf
# Available zoom levels for S-57 chart data
s57.tile.min-zoom=0
s57.tile.max-zoom=14
# Default safety contour depth (meters)
s57.safety.contour.default=10.0
# S-57 data bounding box (Jamaica Bay Area)
s57.bounds.min-lon=-73.8
s57.bounds.min-lat=40.575
s57.bounds.max-lon=-73.725
s57.bounds.max-lat=40.65

# ====================================================
# CORS Configuration
# ====================================================
# Enable CORS for frontend access
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.max-age=3600

# CV trajectory prediction
engine.trajectory-prediction.horizon-seconds=240
engine.trajectory-prediction.step-seconds=30
engine.trajectory-prediction.rot-threshold-deg-per-min=1.5

# AIS kinematic quality
engine.ais-quality.position-jump-speed-multiplier=3.0
engine.ais-quality.position-jump-min-speed-kn=0.5
engine.ais-quality.sog-jump-threshold-kn=10.0
engine.ais-quality.cog-jump-threshold-deg=90.0

# encounter classification
engine.encounter.head-on-bow-half-angle-deg=15.0
engine.encounter.head-on-course-diff-min-deg=170.0
engine.encounter.overtaking-stern-half-angle-deg=67.5
engine.encounter.overtaking-course-diff-max-deg=112.5
